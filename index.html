<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pexaview | Portafolio Visual</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    html, body { height: 100%; margin: 0; scroll-behavior: smooth; }
    * { box-sizing: border-box; }
    .font-syne { font-family: 'Syne', sans-serif; }
    .font-mono { font-family: 'Space Mono', monospace; }
    .grid-portfolio { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .card-hover:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .gradient-text { background: linear-gradient(135deg, #ff6b35, #f7c948); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-bg { background: radial-gradient(ellipse at top left, #1a1a2e 0%, #0f0f1a 50%, #16213e 100%); }
    .nav-glass { background: rgba(15, 15, 26, 0.85); backdrop-filter: blur(12px); }
    .section-dark { background: #0f0f1a; }
    .section-alt { background: #1a1a2e; }
    .barcode-bg { background-color: #fff; padding: 2px; border-radius: 2px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-up { animation: fadeUp 0.7s ease forwards; }
    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.25s; opacity: 0; }
  </style>
</head>

<body class="h-full overflow-auto section-dark text-white font-syne">

  <nav class="nav-glass fixed top-0 left-0 w-full z-50 px-6 py-4 flex items-center justify-between border-b border-white/5">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-orange-500 to-yellow-400 flex items-center justify-center font-bold text-black text-sm">P</div>
      <span class="font-bold text-lg tracking-tight uppercase">PEXAVIEW</span>
    </div>
    <div class="hidden md:flex gap-8 font-mono text-sm text-gray-400">
      <a href="#inicio" class="hover:text-orange-400 transition">Inicio</a>
      <a href="#portafolio" class="hover:text-orange-400 transition">Portafolio</a>
      <a href="#servicios" class="hover:text-orange-400 transition">Servicios</a>
      <a href="#contacto" class="hover:text-orange-400 transition">Contacto</a>
    </div>
  </nav>

  <section id="inicio" class="hero-bg w-full min-h-screen flex items-center justify-center px-6 pt-20 relative overflow-hidden">
    <div class="absolute inset-0 opacity-10" style="background-image: url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22><rect fill=%22none%22 stroke=%22%23ff6b35%22 stroke-width=%220.5%22 width=%2260%22 height=%2260%22/></svg>');"></div>
    <div class="text-center relative z-10 w-full">
      <p class="animate-fade-up delay-1 font-mono text-orange-400 text-sm tracking-widest uppercase mb-4">Diseño Visual & Advertising</p>
      <h1 class="animate-fade-up delay-2 text-6xl md:text-8xl font-extrabold gradient-text leading-tight mb-6 uppercase">PEXAVIEW</h1>
      <p class="animate-fade-up text-xl md:text-2xl text-gray-400 font-light max-w-2xl mx-auto mb-10">Flyers, logos y videos publicitarios para elevar tu marca.</p>
      <div class="animate-fade-up flex gap-4 justify-center flex-wrap">
        <a href="#portafolio" class="px-8 py-3 bg-gradient-to-r from-orange-500 to-yellow-500 text-black font-bold rounded-full hover:scale-105 transition-transform">Ver Portafolio</a>
        <a href="https://wa.me/584166964264" target="_blank" class="px-8 py-3 border border-white/20 rounded-full text-gray-300 hover:border-orange-400 transition flex items-center gap-2">WhatsApp</a>
      </div>
    </div>
  </section>

  <section id="portafolio" class="section-dark w-full py-24 px-6">
    <div class="text-center mb-12">
      <h2 class="text-3xl md:text-4xl font-bold">Catálogo de <span class="gradient-text">Trabajos</span></h2>
      <div class="flex justify-center gap-3 mt-8 flex-wrap">
        <button onclick="renderAll()" class="filter-btn px-5 py-2 rounded-full font-mono text-sm border border-orange-400 text-orange-400 bg-orange-400/10">Todos</button>
      </div>
    </div>
    
    <div id="portfolio-grid" class="grid-portfolio max-w-7xl mx-auto">
      </div>
  </section>

  <footer class="w-full py-8 px-6 border-t border-white/5 text-center section-dark">
    <p class="font-mono text-gray-600 text-sm">© 2026 Pexaview — WhatsApp: +58 416-6964264</p>
  </footer>

  <script>
    const WHATSAPP = "584166964264";

    // Función para cargar los JSON que CloudCannon actualizará
    async function loadData(file) {
      try {
        // Añadimos un parámetro de tiempo para que no use la caché y veas los cambios al instante
        const response = await fetch(data/${file}.json?t=${new Date().getTime()});
        return await response.json();
      } catch (e) { 
        console.error("Error cargando " + file, e);
        return []; 
      }
    }

    async function renderAll() {
      const grid = document.getElementById('portfolio-grid');
      grid.innerHTML = '<p class="text-center col-span-full">Cargando portafolio...</p>';
      
      const flyers = await loadData('flyers');
      const videos = await loadData('videos');
      const logos = await loadData('logos');

      let html = '';

      // Render Flyers
      if(flyers.length) {
        flyers.forEach(item => {
          html += createCard(item.title, item.image, 'Flyer', '5$', 'image');
        });
      }

      // Render Videos
      if(videos.length) {
        videos.forEach(item => {
          html += createCard(item.title, item.video_file, 'Video', '8$', 'video');
        });
      }

      // Render Logos
      if(logos.length) {
        logos.forEach(item => {
          html += createCard(item.client, item.logo_img, 'Logo', '5$', 'image');
        });
      }

      grid.innerHTML = html || '<p class="text-center col-span-full text-gray-500">Sube contenido a las carpetas en data/ para verlo aquí.</p>';
      lucide.createIcons();
    }

    function createCard(title, media, type, price, mediaType) {
      const waMsg = Hola Pexaview! Me interesa el servicio de ${type}: ${title};
      
      // Corregimos la ruta de la media para que siempre sea válida
      const mediaSrc = media.startsWith('/') ? media : /${media};
      
      const mediaHtml = mediaType === 'video' 
        ? <video src="${mediaSrc}" class="w-full h-full object-cover" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
        : <img src="${mediaSrc}" class="w-full h-full object-cover" alt="${title}">;

      return `
        <div class="card-hover bg-white/5 border border-white/10 rounded-2xl overflow-hidden flex flex-col h-full animate-fade-up">
          <div class="h-52 bg-gray-800 relative">
            ${mediaHtml}
            <div class="absolute top-3 left-3 bg-black/60 backdrop-blur-md px-3 py-1 rounded-lg text-[10px] font-mono uppercase tracking-widest">
              ${type}
            </div>
          </div>
          <div class="p-5 flex flex-col flex-grow">
            <div class="flex items-center justify-between mb-4">
              <h3 class="font-bold text-sm">${title || 'Sin título'}</h3>
              <span class="text-orange-400 font-bold font-mono">${price}</span>
            </div>
            <a href="https://wa.me/${WHATSAPP}?text=${encodeURIComponent(waMsg)}" target="_blank" 
               class="mt-auto w-full flex items-center justify-center gap-2 py-3 bg-white/10 hover:bg-orange-500 hover:text-black transition rounded-xl font-bold text-sm">
              <i data-lucide="shopping-cart" class="w-4 h-4"></i> Ordenar
            </a>
          </div>
        </div>
      `;
    }

    window.onload = renderAll;
  </script>
</body>
</html>
